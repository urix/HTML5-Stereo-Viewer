<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML5 Stereo viewer</title>
    <style>
      html, body { margin: 0; padding: 0; }
      h1 { font: 600 20px system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, sans-serif; }
      h2 { font: 600 16px system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, sans-serif; }
      img { max-width: 100%; height: auto; }
    </style>
    <link rel="preload" as="script" href="stereoh5.min.js" />
    <script src="stereoh5.min.js" defer></script>
  </head>
  <body>
    <h1>HTML5 Stereo viewer</h1>
    <div>

		<input type="button" value="Run Stereo Player" onclick="stereoViewerOpen(5, false, 1, true, 'alt', 'stereoRL');" />

      <div style="visibility:visible;">
        <h2>Source images</h2>
        <picture>
          <source srcset="s-lr.webp" type="image/webp" />
          <img src="s-lr.jpg" class="stereoLR" width="100" loading="lazy" decoding="async" alt="Left-Right stereo pair source, Toys" />
        </picture>
        <picture>
          <source srcset="s-a.webp" type="image/webp" />
          <img src="s-a.jpg" class="anaglyph" width="100" loading="lazy" decoding="async" alt="anaglyph source, Toys" />
        </picture>
        <picture>
          <source srcset="s-f.webp" type="image/webp" />
          <img src="s-f.jpg" class="flat" width="100" loading="lazy" decoding="async" alt="flat source, Toys" />
        </picture>
        <picture>
          <source srcset="s-rl.webp" type="image/webp" />
          <img src="s-rl.jpg" class="stereoRL" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source, Toys" />
        </picture>
        <picture>
          <source srcset="s-rl2.webp" type="image/webp" />
          <img src="s-rl2.jpg" class="stereoRL" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source source, St. Basil's Cathedral, Moscow, Russia" />
        </picture>
        <picture>
          <source srcset="s-rl3.webp" type="image/webp" />
          <img src="s-rl3.jpg" class="stereoRL" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source source, St. Basil's Cathedral, Moscow, Russia" />
        </picture>
        <picture>
          <source srcset="s-rl4.webp" type="image/webp" />
          <img src="s-rl4.jpg" class="stereoRL" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source source, Yauza river, Moscow, Russia" />
        </picture>
        <picture>
          <source srcset="s-rl5.webp" type="image/webp" />
          <img src="s-rl5.jpg" class="stereo" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source source, Moscow, Russia" />
        </picture>
        <picture>
          <source srcset="s-rl6.webp" type="image/webp" />
          <img src="s-rl6.jpg" class="stereo" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source source, forrest at Arkhangelsk region, Russia" />
        </picture>
        <picture>
          <source srcset="s-rl7.webp" type="image/webp" />
          <img src="s-rl7.jpg" class="stereo" width="100" loading="lazy" decoding="async" alt="Right-Left stereo pair source source, at concert" />
        </picture>
